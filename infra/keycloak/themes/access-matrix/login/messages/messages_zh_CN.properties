# Access Matrix login theme — 简体中文翻译。
#
# Keycloak v2 自带的 zh_CN 包覆盖大多数键;这里只覆盖与设计稿
# 文案不一致的关键字段。

# ─── 页面标题 ──────────────────────────────────────────────────
loginAccountTitle=欢迎回来。
emailForgotTitle=重置密码。

# ─── 主要按钮 ──────────────────────────────────────────────────
doLogIn=登录
doSubmit=发送重置链接

# ─── 字段标签 ──────────────────────────────────────────────────
usernameOrEmail=邮箱或用户名
loginUsernameOrEmail=邮箱或用户名

# ─── 次级链接 ──────────────────────────────────────────────────
doForgotPassword=忘记密码?
backToLogin=« 返回登录

# ─── 重置密码说明 ──────────────────────────────────────────────
emailInstruction=请输入与您账户关联的邮箱,我们将向您发送一次性的重置链接。

# ─── 记住我 ────────────────────────────────────────────────────
rememberMe=在此设备上保持登录

# ─── 错误提示 ──────────────────────────────────────────────────
# 多租户场景下，"用户名/密码错误" 还可能因为输入的 realm 与该账号
# 注册的 realm 不一致 (例如在 default 租户登录页输入了 acme 租户的
# 账号)。沿用 Keycloak 标准措辞会让用户反复检查输入框，所以把租户
# 这条线索写进同一条提示里。
invalidUserMessage=无效的用户名或密码，或错误的租户。

# Access Matrix login theme — 日本語翻訳。
# Keycloak v2 同梱の ja パックを基本に、デザインと食い違うキーのみ上書き。

# ─── 見出し ────────────────────────────────────────────────────
loginAccountTitle=お帰りなさい。
emailForgotTitle=パスワードのリセット。

# ─── 主要 CTA ──────────────────────────────────────────────────
doLogIn=サインイン
doSubmit=リセットリンクを送信

# ─── フィールドラベル ──────────────────────────────────────────
usernameOrEmail=メールアドレスまたはユーザー名
loginUsernameOrEmail=メールアドレスまたはユーザー名

# ─── 副次リンク ────────────────────────────────────────────────
doForgotPassword=パスワードをお忘れですか？
backToLogin=« サインインに戻る

# ─── パスワードリセットの説明 ──────────────────────────────────
emailInstruction=アカウントに関連付けられたメールアドレスを入力してください。リセット用のワンタイムリンクをお送りします。

# ─── ログイン保持 ──────────────────────────────────────────────
rememberMe=このデバイスでサインインを保持する

# ─── 認証エラー ────────────────────────────────────────────────
# マルチテナント環境では「認証情報の誤り」と「テナント (realm) の
# 取り違え」の症状が同じになる (acme テナントのアカウントを default
# テナントのログイン画面で入力した、など)。標準文言だと入力欄ばかり
# 疑ってしまうので、同じ一文にテナントの可能性を明示する。
invalidUserMessage=ユーザー名、パスワード、またはテナントが正しくありません。

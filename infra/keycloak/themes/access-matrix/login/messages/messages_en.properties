# Access Matrix login theme — English message overrides.
#
# Only the keys whose default Keycloak text doesn't match the design
# are overridden here. Everything else falls through to the parent
# keycloak.v2 theme's messages, which is what keeps this theme cheap
# to maintain across Keycloak version bumps.
#
# Sentence case is preferred throughout, matching the design's
# editorial tone. The big serif heading on /login renders
# `loginAccountTitle`; stock Keycloak says "Sign in to your account",
# the design says "Welcome back.".

# ─── headings ──────────────────────────────────────────────────
loginAccountTitle=Welcome back.
emailForgotTitle=Reset password.

# ─── primary CTAs ──────────────────────────────────────────────
doLogIn=Sign in
doSubmit=Send reset link

# ─── field labels ──────────────────────────────────────────────
# Two keys depending on which branch login.ftl takes — override both.
# Design puts email first ("EMAIL OR USERNAME" once CSS uppercases).
usernameOrEmail=Email or username
loginUsernameOrEmail=Email or username

# ─── secondary links / actions ─────────────────────────────────
# Unicode left-pointing double angle quotation; Keycloak's FreeMarker
# HTML-escapes message values, so &laquo; would render as literal text.
doForgotPassword=Forgot password?
backToLogin=« Back to sign in

# ─── reset-password helper copy ────────────────────────────────
# Stock text reads "Enter your username or email address and we will
# send you instructions on how to create a new password." — replace
# with the design's tighter copy.
emailInstruction=Enter the email associated with your account. We''ll send a one-time link to reset your password.

# ─── remember-me ───────────────────────────────────────────────
# Stock label is "Remember me" — design uses sentence with more
# context. Affects the checkbox visible next to the navy square.
rememberMe=Keep me signed in on this device

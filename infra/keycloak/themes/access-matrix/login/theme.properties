# Access Matrix login theme.
#
# Extends the stock Keycloak v2 (PatternFly-based) theme so we get the
# functional templates for free (login.ftl, register.ftl, info.ftl,
# error.ftl, update-password.ftl, …) and only override visual tokens
# via CSS custom properties. This is the minimum-maintenance path:
# Keycloak version bumps that touch template structure are absorbed
# automatically; only color / font / spacing changes need attention
# when PatternFly itself revs.
#
# If you ever need a totally bespoke layout, switch parent=base and
# author the templates from scratch.

parent=keycloak.v2
import=common/keycloak

# Append our stylesheet AFTER PatternFly so the cascade lets us override.
# Order matters: list base / fonts first, our overrides last.
styles=css/access-matrix.css

# Block out the locale picker if you want a single-language UI; we keep
# it on so Japanese / English users get the matching Keycloak strings.
# Set to false here if a single-language deployment is preferred.
locale=true

# Keycloak runtime config used by start-dev.
#
# Most fields here are also exposed as KC_* environment variables — the
# start-keycloak.bat / .sh scripts in this directory export them inline,
# so this file mostly serves as documentation of the canonical local
# configuration.
#
# Path-mapping: Keycloak looks at $KEYCLOAK_HOME/conf/keycloak.conf by
# default. If you want this file to win, either (a) symlink it from
# there, or (b) launch with `kc.bat start-dev --config-file=<this-path>`.
# The committed start scripts use environment variables instead, so
# nothing in $KEYCLOAK_HOME needs to be edited.

# --- Database ---
# Same Postgres instance as the application, isolated schema. The schema
# `keycloak` was created via: CREATE SCHEMA IF NOT EXISTS keycloak;
db=postgres
db-url=jdbc:postgresql://127.0.0.1:5432/new_inntouch_core?currentSchema=keycloak
db-username=postgres
db-password=abcd@1234

# --- HTTP ---
# 8180 to leave 8080 free for Spring Boot dev runs.
http-port=8180
http-enabled=true
# Bind dual-stack (IPv6 wildcard with V6ONLY=false → accepts v4 too). Without
# this, start-dev binds to "localhost" → 127.0.0.1 only, which breaks Chrome's
# IPv6-first Happy-Eyeballs hit on [::1]:8180. The launcher scripts set
# KC_HTTP_HOST to the same value, but this is the canonical config.
http-host=::

# --- Hostname (dev only) ---
# In dev, Keycloak accepts hostname as-is. For production we'd set
# hostname=auth.example.com and hostname-strict=true.
hostname-strict=false

# --- Logging ---
log=console
log-level=INFO

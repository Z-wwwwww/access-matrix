spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/new_inntouch_core?stringtype=unspecified
    username: postgres
    password: abcd@1234
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD:abcd@1234}
      database: 1
  # ─── Outgoing mail (Tencent ExMail) ───
  # Fill in your own credentials before flipping app.mail.enabled to true. The
  # smtp host / port / SSL flags inherit from application.yml's Tencent defaults.
  mail:
    username: ${CORE_MAIL_USERNAME:wen.zhang@sozonext.com}
    password: ${CORE_MAIL_PASSWORD:}    # paste your ExMail SMTP password / app-password

app:
  security:
    # mode=permit-all keeps local dev frictionless — backend boots with no IdP
    # dependency. Switch to `oidc` once Keycloak is running locally:
    #   1. start-keycloak.bat (see infra/keycloak/README.md)
    #   2. set app.security.mode: oidc here, or run with
    #      APP_SECURITY_MODE=oidc override
    # The issuer-uri default in application.yml already points at
    # http://localhost:8180/realms/default, so no extra config is needed.
    mode: permit-all
    refresh-cookie:
      secure: false
      same-site: Lax
  mail:
    # Set to true to actually send mail (otherwise MailService no-ops and logs).
    # Defaults false so a fresh dev checkout doesn't try to talk to ExMail
    # with empty creds.
    enabled: ${CORE_MAIL_ENABLED:false}
    from:      ${CORE_MAIL_FROM:wen.zhang@sozonext.com}
    from-name: ${CORE_MAIL_FROM_NAME:Access Matrix (dev)}
    base-url:  ${CORE_APP_BASE_URL:http://localhost:5273}
  cors:
    allowed-origins:
      - "*"
  debug:
    expose-error-details: true

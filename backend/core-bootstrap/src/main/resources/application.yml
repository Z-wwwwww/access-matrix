server:
  port: 9135
  servlet:
    context-path: /api
  compression:
    enabled: true
  forward-headers-strategy: framework

spring:
  application:
    name: core-service
  profiles:
    # fail-closed default: missing SPRING_PROFILES_ACTIVE → prod (jwt + tenant on).
    # Local development must set SPRING_PROFILES_ACTIVE=local explicitly.
    active: ${SPRING_PROFILES_ACTIVE:prod}
  jackson:
    time-zone: Asia/Tokyo
    datatype:
      datetime:
        write-dates-as-timestamps: false
  # Spring Mail — JavaMailSender wired from these properties. Concrete
  # creds live in profile-specific yml (application-local.yml fills
  # in CORE_MAIL_*). Defaults match Tencent ExMail (腾讯企业邮),
  # the SMTP relay the inntouch project uses for *@nts-cn.com /
  # *@sozonext.com style mailboxes (see SendMailUtil.hostMap).
  #
  # ExMail-specific quirks:
  #   * port 465 with IMPLICIT TLS  → mail.smtp.ssl.enable=true,
  #     starttls.enable=false (NOT 587 / STARTTLS — that's a different
  #     endpoint that may or may not be enabled per account).
  #   * TLSv1.2+ required; TLS 1.0/1.1 are rejected.
  #   * AUTH must be enabled; username is the FULL email address
  #     (e.g. wen.zhang@nts-cn.com), password is the "client-specific
  #     password" from ExMail console → 安全设置 → 客户端专用密码,
  #     NOT your login password.
  #   * Server-identity check is on so a hijacked DNS can't redirect
  #     us at a fake SMTP endpoint that accepts our creds.
  mail:
    host: ${CORE_MAIL_HOST:smtp.exmail.qq.com}
    port: ${CORE_MAIL_PORT:465}
    username: ${CORE_MAIL_USERNAME:}
    password: ${CORE_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.protocols: TLSv1.2
      mail.smtp.ssl.checkserveridentity: true
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000
      # Envelope-FROM (return-path / bounce target). Tencent ExMail
      # rejects messages whose envelope FROM doesn't match the
      # authenticated user, so we explicitly bind it to the SMTP user.
      mail.smtp.from: ${CORE_MAIL_USERNAME:}
  # Freemarker — used by MailService to render mailtemplate/*.ftl. JSON API
  # so we disable the MVC view resolver; the FreeMarkerConfigurer bean stays
  # auto-wired and MailService injects it directly.
  freemarker:
    enabled: true
    suffix: .ftl
    template-loader-path: classpath:/mailtemplate/
    cache: false
    charset: UTF-8
    settings:
      default_encoding: UTF-8
      localized_lookup: false
  threads:
    virtual:
      enabled: true
  datasource:
    hikari:
      pool-name: core-hikari
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: mark
      logic-delete-value: 0
      logic-not-delete-value: 1
  mapper-locations: classpath*:mapper/**/*.xml

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,caches,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  security:
    # permit-all | jwt | oidc
    #   permit-all : no auth check (tests / smoke only)
    #   jwt        : legacy HS256, tokens signed by AdminAuthController
    #   oidc       : Keycloak / external IdP; JIT-provisions core_auth_user
    #                rows via OidcJitUserService on first login
    mode: permit-all
    jwt:
      secret: ${CORE_JWT_SECRET:dev-placeholder-secret-please-override-32bytes!}
      tenant-claim: tid
      user-id-claim: sub
      username-claim: preferred_username
      authorities-claim: scope
    oidc:
      # Multi-tenant trust prefix — recommended. When set, the backend accepts
      # tokens from ANY realm hosted under this Keycloak base (one realm per
      # tenant; realm name == tenant id). JWKS for each realm is fetched
      # lazily on first sighting and cached. Default points at the locally-
      # launched Keycloak in infra/keycloak/.
      issuer-base-uri: ${CORE_OIDC_ISSUER_BASE_URI:http://localhost:8180}
      # Single-realm pin (legacy / locked-down deploys). When set AND
      # issuer-base-uri is unset, the backend only accepts tokens from this
      # exact realm. Use one or the other — base-uri wins if both are set.
      issuer-uri: ${CORE_OIDC_ISSUER_URI:}
    rate-limit:
      enabled: true
      requests-per-minute: 30
      refill-period: 1m
    lockout:
      enabled: true
      max-failures: 5
      window: 15m
      lock-duration: 15m
    password-policy:
      min-length: 8
      max-length: 128
      require-digit: true
      require-upper: true
      require-lower: true
      require-symbol: true
      hibp-enabled: true
      hibp-base-url: https://api.pwnedpasswords.com
      hibp-timeout: 3s
      fail-open-on-hibp-error: true
    refresh-cookie:
      name: core_refresh
      path: /api/auth
      secure: true
      same-site: Strict
  keycloak:
    # Server-side Keycloak Admin REST connection used by KeycloakUserService
    # to provision / disable / delete users from the backend. Realm = tenant id.
    admin:
      server-url:    ${CORE_KEYCLOAK_SERVER_URL:http://localhost:8180}
      realm:         ${CORE_KEYCLOAK_ADMIN_REALM:master}
      # Default to admin-cli + admin/admin so a fresh local Keycloak just
      # works. In prod we use a dedicated service-account client per realm
      # with only `realm-management/manage-users` granted.
      client-id:     ${CORE_KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
      client-secret: ${CORE_KEYCLOAK_ADMIN_CLIENT_SECRET:}
      username:      ${CORE_KEYCLOAK_ADMIN_USERNAME:admin}
      password:      ${CORE_KEYCLOAK_ADMIN_PASSWORD:admin}
  # Outgoing mail — used by MailService for invite + onboarding notices.
  mail:
    enabled:    ${CORE_MAIL_ENABLED:false}
    from:       ${CORE_MAIL_FROM:noreply@localhost}
    from-name:  ${CORE_MAIL_FROM_NAME:Access Matrix}
    base-url:   ${CORE_APP_BASE_URL:http://localhost:5273}
  invite:
    # Invite token lifetime — default 7 days, matching Keycloak's default for
    # `executeActionsEmail`. Override per environment.
    token-ttl:  ${CORE_INVITE_TOKEN_TTL:7d}
  migration:
    # One-shot password→SSO migration. Only honoured when
    #   app.security.mode = oidc
    #
    # Two recognised values:
    #   password-to-sso          Mirror every legacy core_auth_user row
    #                            (keycloak_id IS NULL) into the matching
    #                            Keycloak realm and trigger UPDATE_PASSWORD
    #                            reset-email. Idempotent — users already in
    #                            KC are skipped, not re-emailed.
    #   password-to-sso-resend   Companion mode: for users mirrored already
    #                            but who let Keycloak's reset link expire
    #                            (default 12h), fire a fresh reset-email
    #                            against the existing KC user. Does NOT
    #                            create new KC users.
    #
    # See docs/migration-password-to-sso.md for the full playbook + gotchas.
    # Leave UNSET in normal operation. Set, restart, verify report, UNSET, restart.
    run-on-startup: ${CORE_MIGRATION_RUN_ON_STARTUP:}
    # Comma-separated list of tenant ids (== realm names) to migrate. The
    # service iterates them sequentially with a synthetic RequestContext per
    # tenant so MyBatis-Plus's tenant interceptor scopes the candidate query
    # correctly. Default = "default" alone.
    tenants:        ${CORE_MIGRATION_TENANTS:default}
    # Where the per-user JSON report lands. One file per run, timestamped.
    report-dir:     ${CORE_MIGRATION_REPORT_DIR:logs}
  mybatis:
    tenant:
      enabled: false
  cache:
    default-spec: "maximumSize=10000,expireAfterWrite=10m,recordStats"
    specs:
      userPermissions: "maximumSize=5000,expireAfterWrite=5m,recordStats"
      userMenu:        "maximumSize=5000,expireAfterWrite=5m,recordStats"
      userDataScope:   "maximumSize=5000,expireAfterWrite=5m,recordStats"
      deptTree:        "maximumSize=64,expireAfterWrite=30m,recordStats"
      deptSubtree:     "maximumSize=2000,expireAfterWrite=30m,recordStats"
  cors:
    allowed-origins: []
  debug:
    expose-error-details: false

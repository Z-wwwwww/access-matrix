# =============================================================================
# Production profile. Most settings come from application.yml (defaults) — this
# file only pins what differs in prod and wires the externalised secrets.
#
# WHAT YOU MUST PROVIDE (env vars) — see backend/.env.example for the full,
# tiered, copy-paste template with examples and defaults:
#   [1] Boot-required:  CORE_DB_URL / CORE_DB_USERNAME / CORE_DB_PASSWORD,
#                       CORE_REDIS_HOST, CORE_JWT_SECRET,
#                       CORE_CORS_ALLOWED_ORIGINS
#   [2] Email (for invites / reset / onboarding): CORE_MAIL_ENABLED,
#                       CORE_MAIL_HOST/USERNAME/PASSWORD/FROM, CORE_APP_BASE_URL
#   [2] SSO (only if APP_SECURITY_MODE=oidc): CORE_OIDC_ISSUER_BASE_URI +
#                       CORE_KEYCLOAK_* — see infra/keycloak/README.md
# Everything else has a sane default in application.yml; override only with a
# reason. Vars with NO default below ( ${VAR} ) fail fast at startup if unset.
# =============================================================================
spring:
  datasource:
    url: ${CORE_DB_URL}
    username: ${CORE_DB_USERNAME}
    password: ${CORE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${CORE_REDIS_HOST}
      port: ${CORE_REDIS_PORT:6379}
      password: ${CORE_REDIS_PASSWORD:}
      database: ${CORE_REDIS_DB:0}
      ssl:
        enabled: true

app:
  security:
    mode: jwt
    jwt:
      secret: ${CORE_JWT_SECRET}
  mybatis:
    tenant:
      enabled: true
  cors:
    allowed-origins: ${CORE_CORS_ALLOWED_ORIGINS}
  debug:
    expose-error-details: false
